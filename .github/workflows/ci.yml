name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Format ─────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Clippy ─────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        contract:
          - contracts/oracle
          - contracts/insurance
          - contracts/lending
          - contracts/fractional
          - contracts/analytics
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Test ${{ matrix.contract }}
        run: cargo test --manifest-path ${{ matrix.contract }}/Cargo.toml --features std

  # ── Build (ink! WASM) ───────────────────────────────────────────────────────
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    strategy:
      matrix:
        contract:
          - contracts/oracle
          - contracts/insurance
          - contracts/lending
          - contracts/fractional
          - contracts/analytics
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-contract
        run: |
          cargo install cargo-contract --version "^4" --locked 2>/dev/null || true
      - name: Build ${{ matrix.contract }}
        run: cargo contract build --manifest-path ${{ matrix.contract }}/Cargo.toml --release

  # ── Security Audit ──────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked 2>/dev/null || true
      - name: Run audit
        run: cargo audit

  # ── Workspace-level tests ────────────────────────────────────────────────────
  workspace-test:
    name: Workspace Tests (std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Run all workspace tests
        run: cargo test --workspace --features std 2>&1 | head -500
